name: Sync Upstream

on:
  schedule:
    # 每周一北京时间 09:00 = UTC 01:00
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/l18381527760-sketch/sporttery-prediction.git 2>/dev/null || true
          git fetch upstream --quiet

      - name: Check for updates
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main 2>/dev/null || echo "0")
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt "0" ]; then
            echo "发现 $BEHIND 个上游更新"
          else
            echo "已是最新"
          fi

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 尝试自动合并
          if git merge upstream/main --no-edit --quiet 2>/dev/null; then
            echo "✓ 自动合并成功"
            git push
          else
            # 合并冲突，放弃并创建 Issue
            git merge --abort
            echo "⚠ 合并冲突，需要手动处理"
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on conflict
        if: steps.check.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '上游同步冲突需要手动处理',
              body: '自动合并 upstream/main 时发生冲突，请手动解决。\n\n运行: `git fetch upstream && git merge upstream/main`',
              labels: ['sync'],
            })
