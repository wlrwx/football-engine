name: Settlement

on:
  schedule:
    # 北京时间 10:00（确保所有比赛结果已出）= UTC 02:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Settlement date (YYYY-MM-DD)'
        required: false

permissions:
  contents: write
  pages: write

concurrency:
  group: sporttery-engine
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run settlement + Elo update + MatchDB
        env:
          SPORTTERY_PROXY: ${{ secrets.SPORTTERY_PROXY }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            # 默认结算昨天（北京时间）
            DATE=$(TZ=Asia/Shanghai date -d 'yesterday' +%Y-%m-%d)
          fi
          python -m engine.main --settle --date "$DATE"

      - name: Rebuild site (show actual results)
        run: python engine/build_site.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/
          git diff --cached --quiet || git commit -m "settle: $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          # 重试 push（解决 daily-forecast 同时 push 的竞争）
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 5
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
