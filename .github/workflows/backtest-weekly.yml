name: Weekly Backtest

on:
  schedule:
    # 每周一北京时间 03:00 = UTC 周日 19:00
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sporttery-engine
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run backtest + parameter optimization
        run: python -m engine.backtest.weekly_run

      - name: Evaluate champion/challenger
        run: python -m engine.learning.weekly_evaluate

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ config/
          git diff --cached --quiet || git commit -m "backtest: weekly optimization $(date +%Y-%m-%d)"
          git push
