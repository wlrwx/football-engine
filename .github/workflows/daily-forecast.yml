name: Daily Forecast

on:
  schedule:
    # 10:15, 10:45, 11:15... 每30分钟，错开 settlement (10:00)
    - cron: '15,45 * * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sporttery-engine
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Fetch DJYY SSR odds
        run: python scripts/fetch_djyy_ssr.py

      - name: Run daily forecast
        env:
          SPORTTERY_PROXY: ${{ secrets.SPORTTERY_PROXY }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            # 竞彩使用北京时间，GitHub Actions 默认 UTC
            DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          fi
          python -m engine.main --date "$DATE"

      - name: Build site
        run: python engine/build_site.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/
          git diff --cached --quiet || git commit -m "daily: forecast $(date +%Y-%m-%d)"
          for i in 1 2 3; do git pull --rebase origin main && git push && break; sleep 5; done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
