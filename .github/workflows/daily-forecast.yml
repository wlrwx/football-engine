name: Daily Forecast

on:
  schedule:
    # 第一次：北京时间 11:00（开盘后2小时）= UTC 03:00
    - cron: '0 3 * * *'
    # 第二次：北京时间 17:00（临场更新）= UTC 09:00
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write

concurrency:
  group: sporttery-engine
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run daily forecast
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then
            python -m engine.main --date today
          else
            python -m engine.main --date "$DATE"
          fi

      - name: Build site
        run: python engine/build_site.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ web/
          git diff --cached --quiet || git commit -m "daily: forecast $(date +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
